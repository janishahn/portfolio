title: "Evaluating Open-source LLMs for Privacy Policy Annotation"
summary: "This thesis investigates the performance of open-source large language models (LLMs), such as Meta's Llama and Google's Gemma, in annotating privacy policies for GDPR compliance. Using a custom evaluation pipeline, the models were assessed against a GPT-4o-generated reference dataset. Results show that while open-source models perform adequately, they lack the reliability needed for high-stakes legal tasks. Google's Gemma 2 9B model performed best, with 27B close behind. Despite current limitations, open-source LLMs hold promise for scalable and localized privacy policy analysis with further model development and fine-tuning."
abstract: "This thesis evaluates the performance of open-source large language models (LLMs) in annotating privacy policies with regards to GDPR compliance. With the rise of advanced closed-source LLMs like OpenAI's GPT-series of models and Anthropic's Claude models in recent years, their use in privacy policy analysis has become a popular technique for automatically processing the typically long and incomprehensible legal documents. In contrast to closed-source models, this thesis focuses on exploring the use of open-source alternatives, including Meta's Llama and Google's Gemma models. The study introduces a pipeline for the automated evaluation of these models, examining metrics such as precision, recall and F1-Score alongside semantic similarity scores and classification metrics. The evaluation of the models against a reference dataset generated by Openai's GPT-4o reveals that open-source models perform adequately for the task of the task of privacy policy annotation, but leave a lot to be wished for in terms of reliability, especially for the legal task at hand where accuracy is crucial. They also offer up great potential for a variety of applications, be it the local analysis of policies on low-end, unspecialized hardware, or the large scale analysis with mid-sized or high parameter count models on more sophisticated, dedicated GPUs. However, limitations in processing power and inherent variability in LLM outputs and privacy policies themselves present challenges. Ultimately, this thesis concludes that Google's Gemma 2 9B performs the best for privacy policy annotation among the tested models, with Gemma 2 27B showing similar performance. They currently have weaknesses, but given more developments, such as the use of other, more suitable model architectures or specialization through finetuning of models, the use of open-source LLMs has significant potential in the field of automated privacy policy annotation."
